services:
  postgres:
    image: postgres:16-alpine
    container_name: cykani-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${PG_PASSWORD:-1234}"
      POSTGRES_DB: cykani
    volumes:
      - cykani-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cykani-redis
    ports:
      - "6379:6379"
    volumes:
      - cykani-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cykani-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: "3000"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      JWT_SECRET: "${JWT_SECRET}"
      API_KEY_SECRET: "${API_KEY_SECRET}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3001}"
      DOCKER_SOCKET: "${DOCKER_SOCKET:-/var/run/docker.sock}"
      BROWSER_IMAGE: "${BROWSER_IMAGE:-cykani-browser:latest}"
      MAX_SESSIONS_PER_ORG: "${MAX_SESSIONS_PER_ORG:-10}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      LEMON_SQUEEZY_API_KEY: "${LEMON_SQUEEZY_API_KEY:-}"
      LEMON_SQUEEZY_WEBHOOK_SECRET: "${LEMON_SQUEEZY_WEBHOOK_SECRET:-}"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cykani-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3001}:3000"
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      DATABASE_URL: "${DATABASE_URL}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3001}"
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET}"
      AUTH_GITHUB_ID: "${AUTH_GITHUB_ID}"
      AUTH_GITHUB_SECRET: "${AUTH_GITHUB_SECRET}"

volumes:
  cykani-pg-data:
  cykani-redis-data:
