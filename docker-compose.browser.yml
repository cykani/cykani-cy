# docker-compose.browser.yml — cykani browser infrastructure
#
# This file contains ONLY browser-related services.
# The app stack (API, web, postgres, redis) runs natively on the host OS.
#
# Usage:
#   docker compose -f docker-compose.browser.yml up -d
#   docker compose -f docker-compose.browser.yml down
#
# Services:
#   browser  - Patched Chromium for session containers

services:
  browser:
    image: ${BROWSER_IMAGE:-cykani-browser:latest}
    container_name: cykani-browser
    shm_size: 2gb
    tmpfs:
      - /tmp:size=512m
    environment:
      - DISPLAY=${DISPLAY:-:99}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
